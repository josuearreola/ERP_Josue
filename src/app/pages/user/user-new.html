<div class="page-content">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>
  
  <div class="form-header">
    <h1>Gestión de Usuarios</h1>
    <p>Administrar usuarios del sistema</p>
    <p-button 
      label="Nuevo Usuario" 
      icon="pi pi-plus" 
      (onClick)="showCreateDialog()"
      styleClass="p-button-success">
    </p-button>
  </div>

  <!-- Tabla de usuarios -->
  <p-table [value]="users" [tableStyle]="{'min-width': '50rem'}" styleClass="p-datatable-gridlines">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Usuario</th>
        <th>Email</th>
        <th>Nombre Completo</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{user.id}}</td>
        <td>{{user.username}}</td>
        <td>{{user.email}}</td>
        <td>{{user.fullName}}</td>
        <td>{{user.phone}}</td>
        <td>
          <p-button 
            icon="pi pi-pencil" 
            (onClick)="editUser(user)"
            styleClass="p-button-warning p-button-text"
            pTooltip="Editar">
          </p-button>
          <p-button 
            icon="pi pi-trash" 
            (onClick)="deleteUser(user)"
            styleClass="p-button-danger p-button-text"
            pTooltip="Eliminar">
          </p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <!-- Modal para crear/editar usuario -->
  <p-dialog 
    [header]="isEditing ? 'Editar Usuario' : 'Nuevo Usuario'"
    [(visible)]="displayDialog"
    [modal]="true"
    [style]="{width: '600px'}"
    [draggable]="false"
    [resizable]="false">
    
    <form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)" class="user-form">
      <div class="form-row">
        <div class="field">
          <label for="username">Usuario</label>
          <input pInputText type="text" id="username" name="username" [(ngModel)]="user.username" required class="w-full" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input pInputText type="email" id="email" name="email" [(ngModel)]="user.email" required class="w-full" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="fullName">Nombre Completo</label>
          <input pInputText type="text" id="fullName" name="fullName" [(ngModel)]="user.fullName" required class="w-full" />
        </div>
        <div class="field">
          <label for="birthDate">Fecha Nacimiento</label>
          <input pInputText type="date" id="birthDate" name="birthDate" [(ngModel)]="user.birthDate" required class="w-full" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="phone">Teléfono</label>
          <input pInputText type="tel" id="phone" name="phone" [(ngModel)]="user.phone" required class="w-full" />
        </div>
        <div class="field">
          <label for="address">Dirección</label>
          <input pInputText type="text" id="address" name="address" [(ngModel)]="user.address" required class="w-full" />
        </div>
      </div>
      @if (!isEditing) {
      <div class="form-row">
        <div class="field">
          <label for="password">Contraseña</label>
          <input pInputText type="password" id="password" name="password" [(ngModel)]="user.password" required class="w-full" />
        </div>
        <div class="field">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <input pInputText type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="user.confirmPassword" required class="w-full" />
        </div>
      </div>
      }
      
      <div class="form-actions">
        <p-button 
          label="Cancelar" 
          icon="pi pi-times" 
          (onClick)="displayDialog = false"
          styleClass="p-button-text">
        </p-button>
        <p-button 
          label="{{isEditing ? 'Actualizar' : 'Crear'}}" 
          icon="pi pi-check" 
          type="submit"
          styleClass="p-button-success">
        </p-button>
      </div>
    </form>
  </p-dialog>

</div>
