<div class="page-content">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>
  
  <div class="header-section">
    <div class="stats-row">
      
      <p-button label="Nuevo Usuario" icon="pi pi-plus" (onClick)="showCreateDialog()"
        styleClass="p-button-success new-user-btn">
      </p-button>
      </div>
    
    
    
    <!-- Tabla de usuarios -->
    <div class="users-table">
      <h2>Lista de Usuarios</h2>
      <p-table [value]="users" [tableStyle]="{'min-width': '50rem'}" styleClass="p-datatable-gridlines">
        <ng-template pTemplate="header">
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Email</th>
            <th>Nombre Completo</th>
            <th>Teléfono</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
          <tr>
            <td>{{user.id}}</td>
            <td>{{user.username}}</td>
            <td>{{user.email}}</td>
            <td>{{user.fullName}}</td>
            <td>{{user.phone}}</td>
            <td>{{user.role}}</td>
            <td>{{user.status}}</td>
            <td>
              <p-button icon="pi pi-pencil" (onClick)="editUser(user)" styleClass="p-button-warning p-button-text">
              </p-button>
              <p-button icon="pi pi-trash" (onClick)="deleteUser(user)" styleClass="p-button-danger p-button-text">
              </p-button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
    
    <!-- Modal para crear/editar usuario -->
    <p-dialog [header]="isEditing ? 'Editar Usuario' : 'Nuevo Usuario'" [(visible)]="displayDialog" [modal]="true"
      [style]="{width: '700px'}" [draggable]="false" [resizable]="false">
    
      <form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)" class="user-form">
      <div class="form-row">
        <div class="field">
          <label for="username">Usuario</label>
          <input pInputText type="text" id="username" name="username" [(ngModel)]="user.username" required class="w-full" />
          </div>
        <div class="field">
          <label for="email">Correo Electrónico</label>
          <input pInputText type="email" id="email" name="email" [(ngModel)]="user.email" required class="w-full" />
          </div>
          </div>
      <div class="form-row">
        <div class="field">
          <label for="fullName">Nombre Completo</label>
          <input pInputText type="text" id="fullName" name="fullName" [(ngModel)]="user.fullName" required class="w-full" />
          </div>
          <div class="field">
            <label for="birthDate">Fecha de Nacimiento</label>
            <input pInputText type="date" id="birthDate" name="birthDate" [(ngModel)]="user.birthDate" required class="w-full" />
          </div>
          </div>
          
          <div class="form-row">
            <div class="field">
          <label for="phone">Teléfono</label>
          <input pInputText type="text" id="phone" name="phone" [(ngModel)]="user.phone" placeholder="Número de teléfono" required
            class="w-full" />
          </div>
        <div class="field">
          <label for="role">Rol</label>
          <select id="role" name="role" [(ngModel)]="user.role" required class="form-select w-full">
            <option value="">Seleccionar rol</option>
            <option value="Administrador">Administrador</option>
            <option value="Usuario">Usuario</option>
            <option value="Supervisor">Supervisor</option>
            <option value="Gerente">Gerente</option>
            <option value="Operador">Operador</option>
          </select>
          </div>
      </div>
      
      <div class="form-row">
        <div class="field">
          <label for="address">Dirección</label>
          <input pInputText type="text" id="address" name="address" [(ngModel)]="user.address" placeholder="Dirección completa"
            required class="w-full" />
          </div>
        <div class="field">
          <label for="status">Estado</label>
          <select id="status" name="status" [(ngModel)]="user.status" required class="form-select w-full">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
            <option value="Suspendido">Suspendido</option>
          </select>
          </div>
          </div>
          
          <div class="form-actions">
        <p-button label="Cancelar" icon="pi pi-times" (onClick)="displayDialog = false" styleClass="p-button-text">
        </p-button>
        <p-button label="{{isEditing ? 'Actualizar' : 'Crear'}}" icon="pi pi-check" type="submit" styleClass="p-button-success">
        </p-button>
        </div>
        </form>
  </p-dialog>

</div>
