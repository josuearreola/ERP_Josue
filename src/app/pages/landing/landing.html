<div class="flex flex-col items-center justify-center h-full">
    <p-card>
        <ng-template #header>
            <div class="flex flex-col items-center gap-2 p-4">
                <h1 class="text-4xl font-bold m-0">Landing Page</h1>
            </div>
        </ng-template>
        <div class="flex flex-col gap-4 items-center">
            <p class="text-center m-0">Selecciona una opción para continuar</p>
            <div class="flex gap-4">
                <button pButton label="Iniciar Sesión" routerLink="/auth/login"></button>
                <button pButton label="Registrarse" severity="secondary" routerLink="/auth/register"></button>
            </div>
        </div>
    </p-card>
</div>
